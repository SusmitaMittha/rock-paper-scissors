<html lang="en">

</head>
<body>
    <div class="main">
        
    <h1>Rock Paper Scissors</h1>

        <p id="user-choice-para">Select Your Choice :</p>
        <p id="compute-choice-par">Computer's Choice is :</p>

  <button class="btn rock" id="rock">🪨 Rock</button>
<button class="btn paper" id="paper">📄 Paper</button>
<button class="btn scissors" id="scissors">✂️ Scissors</button>
  <script src="script.js"></script>

    </div>
